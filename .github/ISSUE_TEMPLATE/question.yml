name: 質問 (Question)
description: 学習中の疑問を聞く
title: "[質問] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        まずは AI（Claude Code 等）に聞いて、それでも残った疑問をここで共有してください。
        AI と一緒に考えた仮説まで書いてあると、回答する側も助かります。

  - type: input
    id: context
    attributes:
      label: どの章・文脈
      placeholder: "例：01-claude-code-intro, スライド 7 の Persona の話"
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: 質問内容
    validations:
      required: true

  - type: textarea
    id: hypothesis
    attributes:
      label: 自分なりの仮説（任意）
      description: AI と一緒に考えた仮説や、自分が分かったところまで
    validations:
      required: false
