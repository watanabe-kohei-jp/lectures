name: 詰まり報告 (Stuck)
description: 教材を読んでいて詰まった点を報告する。次の受講者を助ける貴重な情報です。
title: "[詰まり] "
labels: ["stuck"]
body:
  - type: markdown
    attributes:
      value: |
        詰まった経験はそのまま次の受講者を助けます。具体的にどこで・何が分からなかったかを共有してください。
        AI（Claude Code 等）と一緒に投稿している方は、個人情報を除いた状態にしてから submit してください。

  - type: input
    id: location
    attributes:
      label: どの Lecture / 章 / スライド
      placeholder: "例：01-claude-code-intro, スライド 5"
    validations:
      required: true

  - type: textarea
    id: stuck
    attributes:
      label: 何が分からなかった/詰まったか
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: 何を試したか（任意）
      description: AI に聞いた内容、参照したドキュメント、自分なりの仮説 等
    validations:
      required: false

  - type: textarea
    id: ai-context
    attributes:
      label: AI とのやりとり抜粋（任意）
      description: 個人を特定できる情報（実名・会社名・社内パス・API キー等）は除いてください
    validations:
      required: false
